<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 340px;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 6px;
    }
    #url {
      font-size: 11px;
      color: #666;
      word-break: break-all;
      margin-bottom: 10px;
    }
    #score {
      font-weight: 600;
      margin-bottom: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      background: #f2f2f2;
    }
    ul#header-list, ul#extra-list {
      list-style: none;
      padding: 0;
      margin: 0 0 12px;
    }
    ul#header-list li {
      padding: 3px 0;
      font-size: 12px;
      line-height: 1.4;
    }
    ul#extra-list li {
      padding: 2px 0;
      font-size: 11.5px;
      color: #444;
    }
    li.pass { color: #157347; }
    li.weak { color: #a15c00; }
    li.fail { color: #b02a37; }

    .legend {
      font-size: 10.5px;
      color: #888;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #888;
      margin: 12px 0 4px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      margin: 0 0 10px;
      padding: 8px;
    }
    legend {
      font-size: 11px;
      color: #666;
      padding: 0 4px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 5px 6px;
      margin-bottom: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: inherit;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    button:disabled {
      background: #999;
      cursor: default;
    }
    #status {
      margin-top: 6px;
      font-size: 12px;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <h1>SME Header Auditor</h1>
  <div id="url">loading…</div>
  <div id="score">—</div>
  <div class="legend">✓ pass &nbsp; ⚠ present but weak &nbsp; ✗ missing</div>
  <ul id="header-list"></ul>

  <h2>Additional signals (not scored)</h2>
  <ul id="extra-list"></ul>

  <fieldset>
    <legend>Add to dataset (auto-filled where possible — check before saving)</legend>
    <input id="business-name" placeholder="Business name" />
    <input id="category" placeholder="Category (e.g. Retail – Grocery/FMCG)" />
    <input id="city" placeholder="City" />
    <input id="state" placeholder="State" />
    <textarea id="notes" placeholder="Notes" rows="2"></textarea>
    <button id="add-btn">Add to dataset</button>
    <div id="status"></div>
  </fieldset>

  <script src="popup.js"></script>
</body>
</html>
